# Audio
sample_rate: 16000

# STFT
n_fft: 512          # changed from 510 — must be power of 2
hop_length: 100
win_length: 512     # changed from 510 — must match n_fft
window: hann

# Model
model: cnn_denoiser
dense_channels: 16
# TODO: add muse section when we implement stage 2

# Training
batch_size: 16
learning_rate: 0.0001
lr_patience: 3
epochs: 15
optimizer: adam
loss: l1

# Data
frame_length: 30700
manifest: dataset_manifest.csv
train_clean: data/voicebank_demand/train/clean
train_noisy: data/voicebank_demand/train/noisy
test_clean:  data/voicebank_demand/test/clean
test_noisy:  data/voicebank_demand/test/noisy

# Speech/noise mixing
mix_snr_min: 0
mix_snr_max: 20

# Checkpointing
checkpoint_dir: checkpoints/
save_every: 1
keep_last: 5

# Logging
log_interval: 100
seed: 42
num_workers: 2
pin_memory: true

# AWGN noise injection
awgn_snr_min: -4    # changed from discrete list to continuous range
awgn_snr_max: 10

# IQ imbalance noise injection
iq_imbalance:
  amplitude_range: [0.95, 1.05]   # ±5% gain mismatch between I and Q
  phase_range: [-5, 5]            # ±5 degrees of phase error